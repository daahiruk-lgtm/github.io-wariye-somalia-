<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qurxoon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Amiri:ital,wght@0,400;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Playfair Display', serif;
  }

  .card {
    position: relative;
    width: 700px;
    height: 520px;
    overflow: hidden;
    border-radius: 4px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.9);
  }

  .img-layer {
    position: absolute;
    inset: 0;
    background: url('image.jpg') center/cover no-repeat;
    filter: grayscale(20%) contrast(1.1) brightness(0.75);
  }

  /* Deep teal-blue cinematic color grade */
  .color-grade {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      rgba(10, 30, 60, 0.55) 0%,
      rgba(20, 60, 80, 0.4) 40%,
      rgba(80, 20, 40, 0.35) 100%
    );
    mix-blend-mode: multiply;
  }

  /* Vignette */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 35%,
      rgba(0,0,0,0.7) 100%
    );
  }

  /* Bottom gradient for text */
  .text-fade {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 65%;
    background: linear-gradient(
      to top,
      rgba(5, 8, 20, 0.95) 0%,
      rgba(5, 8, 20, 0.6) 50%,
      transparent 100%
    );
  }

  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 40px 50px;
    text-align: center;
  }

  .ornament {
    color: #c9a96e;
    font-size: 22px;
    letter-spacing: 8px;
    margin-bottom: 16px;
    opacity: 0.8;
  }

  .quote {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 22px;
    line-height: 1.7;
    color: #f0e8d8;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    margin-bottom: 18px;
    letter-spacing: 0.3px;
  }

  .quote span.highlight {
    color: #e8c07a;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, transparent, #c9a96e, transparent);
    margin: 0 auto 14px;
  }

  .author {
    font-family: 'Amiri', serif;
    font-size: 13px;
    color: #9db4c0;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Top corner accent */
  .corner-tl, .corner-br {
    position: absolute;
    width: 40px;
    height: 40px;
    opacity: 0.5;
  }
  .corner-tl {
    top: 20px; left: 20px;
    border-top: 1px solid #c9a96e;
    border-left: 1px solid #c9a96e;
  }
  .corner-br {
    bottom: 20px; right: 20px;
    border-bottom: 1px solid #c9a96e;
    border-right: 1px solid #c9a96e;
  }

  /* Film grain overlay */
  .grain {
    position: absolute;
    inset: 0;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 128px;
  }

</style>
</head>
<body>
<div class="card">
  <div class="img-layer"></div>
  <div class="color-grade"></div>
  <div class="vignette"></div>
  <div class="text-fade"></div>
  <div class="grain"></div>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <div class="content">
    <div class="ornament">❧ ✦ ❧</div>
    <div class="quote">
      Jaceylku ma aha kaliya farxad,<br>
      waa <span class="highlight">xanuun macaan</span> oo qalbiga ku nool —<br>
      mid aad u lumiso, mid aad u raadsato,<br>
      mid <span class="highlight">abid kugu jira</span> xitaa marka uu tago.
    </div>
    <div class="divider"></div>
    <div class="author">Jacayl · Xanuun · Nolol</div>
  </div>
</div>
</body>
</html>
